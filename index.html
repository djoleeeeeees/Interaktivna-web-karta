<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <title>Интерактивна карта Београда</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css"
    />
    <script type="module" crossorigin src="./assets/index.63bb7201.js"></script>
  </head>

  <body>
    <div id="map-container"></div>
    <div id="layer-switcher">
      <h3>Промена лејера</h3>
      <label class="switcher-item"
        ><input type="checkbox" id="chk-cog" checked /> Сентинел 2А
        снимак</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-osm" checked /> Open Street Map</label
      >

      <h3>Легенда</h3>
      <label class="switcher-item"
        ><input type="checkbox" id="chk-poi" checked /> 📍 Знаменитости</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-river" checked /> 💧 Река</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-parks" checked /> 🌳 Парк</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-forest" checked /> 🌲 Шума</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-highway" checked /> 🚗 Пут</label
      >
      <label class="switcher-item"
        ><input type="checkbox" id="chk-railway" checked /> 🚂 Пруга</label
      >
    </div>

    <div id="mouse-position"></div>

    <div id="popup" class="ol-popup">
      <a href="#" id="popup-closer" class="ol-popup-closer"></a>
      <div id="popup-content"></div>
    </div>

    
    <style>
      html,
      body,
      #map-container {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      #layer-switcher {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(255, 255, 255, 0.95);
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        max-width: 220px;
      }

      #layer-switcher h3 {
        margin: 0 0 10px 0;
        font-size: 0.95em;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #2c3e50;
        border-bottom: 2px solid #3498db;
        padding-bottom: 5px;
      }

      .switcher-item {
        margin: 8px 0;
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 0.9em;
        color: #34495e;
      }

      .switcher-item input {
        margin-right: 8px;
        cursor: pointer;
      }

      #mouse-position {
        position: absolute;
        bottom: 65px;
        left: 8px;
        background: none;
        color: #ffffff;
        font-size: 1.15em;
        font-family: monospace;
        font-weight: bold;
        z-index: 1000;
        min-width: 140px;
        text-align: center;
      }

      .ol-popup {
        position: absolute;
        background-color: white;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        padding: 10px 15px;
        border-radius: 6px;
        border: 1px solid #cccccc;
        bottom: 15px;
        left: -50px;
        min-width: 150px;
        z-index: 2000;
      }
    </style>
  </body>
</html>
